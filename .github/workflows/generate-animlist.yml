name: Generate animlist.lua

on:
  push:
    paths:
      - 'scripts/reanimation/animations/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate animlist.lua
        run: |
          python3 << 'EOF'
          import os
          import urllib.parse

          base_url = "https://yourscoper.pages.dev/scripts/reanimation/animations"
          output_path = "scripts/akadmin/animlist.lua"
          anim_dir = "scripts/reanimation/animations"

          lines = ["return {\n"]

          for fname in sorted(os.listdir(anim_dir)):
              if fname.endswith(".lua"):
                  name = fname[:-4]
                  encoded = urllib.parse.quote(name)
                  lines.append(f'    ["{name}"] = "{base_url}/{encoded}.lua",\n')

          lines.append("}\n")

          with open(output_path, "w") as f:
              f.writelines(lines)

          print(f"Generated {len(lines)-2} animations.")
          EOF

      - name: Commit animlist.lua
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/akadmin/animlist.lua
          git diff --cached --quiet || git commit -m "chore: auto-update animlist.lua"
          git push
